version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: coworktimer
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/coworktimer
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
